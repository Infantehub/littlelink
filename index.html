<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-light" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Rapidex Meu</title>
    <link rel="icon" type="image/x-icon" href="images/TUIST_logo.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="LinkTree Caloiral" content="LinkTreee feita para agilizar o acesso aos links mais úteis para os Caloiros.">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://yourwebsite.com">

    <!-- Author Information -->
    <meta name="Tiago Infante" content="Caloiro">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/TUIST_logo.png" alt="Rapidex Meu">

            <!-- Replace with your name or brand -->
            <h1>
              <div>Rapidex Meu</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Despacha-te a ver as cenas!</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Drive Caloiral -->
              <a class="button button-DriveCaloiral" href="https://drive.google.com/drive/u/0/folders/1wrfl-mUTBUiSKtaUXFrPZS35mYVair0B" target="_blank" rel="noopener" role="button">
                <img class="avatar avatar--rounded" aria-hidden="true" src="images/icons/burro.jpg" alt="LittleLink Logo">
                Drive Caloiral</a>

              <!-- Spread das Presenças da Direção -->
              <a class="button button-pd" href="https://docs.google.com/spreadsheets/d/1n5dSthvOHMJ_xUBX2QlRF-1bf9c8oKJU5hQiqvBMbgw/edit#gid=0" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/certo.jpg" alt="Amazon Wishlist Logo">
                Spread das Presenças da Direção</a>

              <!-- Área Privada -->
              <a class="button button-ap" href="https://ap.tuist.pt/login" target="_blank" rel="noopener" role="button">
                <img class="avatar avatar--rounded" aria-hidden="true" src="images/icons/boxers.jpg" alt="Amazon Music Logo">
                AP - Área Privada</a>

              <!-- Cancioneiro -->
              <a class="button button-cancioneiro" href="https://drive.google.com/drive/u/0/folders/1OQEcKsZmWvCqHIwDkR4dULkNqX9pfzZz" target="_blank" rel="noopener" role="button">
                <img class="avatar avatar--rounded" aria-hidden="true" src="images/icons/clave-de-sol.png" alt="Apple Logo">
                Cancioneiro</a>

              <!-- Forms Tesouraria -->
              <a class="button button-ft" href="https://docs.google.com/forms/d/e/1FAIpQLSc3tE3ZSP_5P2Vt-YkfuqR2m7zBUKai8TJ9Ng509Zw0-y9qQw/viewform" target="_blank" rel="noopener" role="button">
                <img class="avatar avatar--rounded" aria-hidden="true" src="images/icons/tesoura.jpg" alt="Apple Invites Logo">
                Forms Tesouraria</a>

              <!-- ProtoSpread -->
              <a class="button button-ps" href="https://docs.google.com/spreadsheets/d/1D-9AJ3NfiIYMIMvfL-KPvrpEAx35EMjZJVT92Vlnf8o/edit?gid=0#gid=0" target="_blank" rel="noopener" role="button">
                <img class="avatar avatar--rounded" aria-hidden="true" src="images/icons/proteina.jpg" alt="Apple Music Logo">
                Proto Spread</a>
      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>

    </div>
  </div>

</body>

</html>
